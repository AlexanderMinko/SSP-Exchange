spring:
  application:
    name: exchange
  threads:
    virtual:
      enabled: true
  mongodb:
    uri: ${MONGODB_URI:mongodb://localhost:27017/ssp-exchange}

exchange:
  config-refresh-ms: 30000
  bidder:
    connect-timeout-ms: 100
    read-timeout-ms: 1000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
  otlp:
    metrics:
      export:
        enabled: ${OTLP_METRICS_ENABLED:false}
        url: ${OTLP_ENDPOINT:http://localhost:4318}/v1/metrics
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318}/v1/traces
  tracing:
    enabled: ${TRACING_ENABLED:false}
    sampling:
      probability: 1.0
